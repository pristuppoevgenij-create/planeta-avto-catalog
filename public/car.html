<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Автомобиль — Планета Авто</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1B3A6B">
</head>
<body>

<header>
  <div class="header-inner">
    <button class="btn-back" onclick="history.back()">Назад</button>
    <a href="tel:+73512001234" class="header-phone">Позвонить</a>
  </div>
</header>

<div class="car-page" id="car-page">
  <div class="loading" style="padding: 80px 20px">
    <div class="loading-spinner"></div>
    Загружаем…
  </div>
</div>

<footer>
  <strong>Планета Авто</strong><br>
  Автомобили с пробегом · Челябинск
</footer>

<div class="toast" id="toast"></div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); lightboxNav(-1)">‹</button>
  <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); lightboxNav(1)">›</button>
  <div class="lightbox-img-wrap" id="lightbox-img-wrap">
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
  </div>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script src="car.js"></script>
</body>
</html>
